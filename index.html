<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Charakterauswahl für Aeva, Beatrix, Brixxli, Tezanji und Demetria.">
  <meta name="theme-color" content="#0a0d12">
  <title>Charsheet Selection</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="landing-body">
  <div class="landing-background-layer" id="landingBackground" aria-hidden="true"></div>
  <div class="landing-aurora" aria-hidden="true">
    <div class="landing-glow landing-glow-one"></div>
    <div class="landing-glow landing-glow-two"></div>
    <div class="landing-grain"></div>
  </div>
  <div class="landing-shell">
    <header class="landing-hero">
      <p class="eyebrow">Charsheet Selection</p>
      <h1>Figuren im Fokus</h1>
      <p class="landing-copy">
        Wähle eine Figur und bewege dich direkt in ihre Perspektive. Die Auswahl
        bleibt bewusst klar und direkt, bekommt aber mehr Bühne, Kontext und
        Führung.
      </p>
    </header>
    <main>
      <section class="card-grid" id="characterGrid" aria-label="Charakterauswahl"></section>
    </main>
  </div>
  <script src="js/catalog.js"></script>
  <script src="js/landing.js"></script>
</body>
</html>
